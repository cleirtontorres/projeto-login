<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="estilos/style.css">
</head>

<body>
    <main>
        <div id="img"></div>
        <h1>Login</h1>
        <p>
            Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu
            ambiente.
        </p>
        <form action="login.php" method="post">
            <div class="campo">
                <span class="material-symbols-outlined">Mail</span>
                <input class="inp" type="email" name="email" id="email" placeholder="seu e-mail" required autocomplete="on" minlength="8">
            </div > 
            <div class="campo">
                <span class="material-symbols-outlined">key</span>
                <input class="inp" type="password" name="senha" id="senha" placeholder="sua senha" required autocomplete="on" minlength="8">
            </div> 
            <div ><input class="button entrar" type="submit" value="Entrar"></div>
            <div ><input class="button" type="submit" value="Esqueci a senha"></div>


        </form>
    </main>
</body>

</html>
